name: Stock Screening

on:
  schedule:
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install alphasift
        run: pip install -e .

      - name: Run screening
        run: alphasift screen dual_low --no-llm --save-run
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Find latest run file
        id: run-file
        run: |
          RUN_FILE=$(ls -t ${{ github.workspace }}/data/runs/*.json | head -1)
          echo "run_file=$RUN_FILE" >> $GITHUB_OUTPUT

      - name: Parse and send results to Telegram
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request

run_file = os.environ.get('RUN_FILE', '')
token = os.environ.get('TELEGRAM_BOT_TOKEN', '')
chat_id = os.environ.get('TELEGRAM_CHAT_ID', '')

with open(run_file) as f:
    data = json.load(f)

picks = data.get("picks", [])[:5]
strategy = data.get("strategy", "unknown")
run_id = data.get("run_id", "")
snapshot_count = data.get("snapshot_count", 0)
after_filter_count = data.get("after_filter_count", 0)

lines = [
    f"📊 *{strategy.upper()} 选股结果*",
    f"🗂 扫描: {snapshot_count} → {after_filter_count} 只",
    f"⏱ Run: `{run_id}`",
    "",
    "🏆 *Top 5 Picks:*",
    ""
]

for p in picks:
    change = p.get("change_pct", 0) or 0
    emoji = "🔴" if change < 0 else ("🟢" if change > 0 else "⚪")
    lines.append(f"{p.get('rank', '?')}. *{p.get('name', '')}* ({p.get('code', '')})")
    lines.append(f"   {emoji} {change:+.2f}% | ¥{p.get('price', 0):.2f} | Score: {p.get('final_score', 0):.1f}")
    lines.append(f"   PE: {p.get('pe_ratio', 0):.1f} | PB: {p.get('pb_ratio', 0):.2f}")
    tags = p.get("post_analysis_tags", [])
    if tags:
        lines.append(f"   🏷 {' | '.join(tags)}")
    lines.append("")

lines.append("⚠️ 仅供参考，不构成投资建议")
lines.append("🔗 github.com/romanchen1995/alphasift")

payload = json.dumps({"chat_id": chat_id, "text": "\n".join(lines), "parse_mode": "Markdown"}).encode()
req = urllib.request.Request(f"https://api.telegram.org/bot{token}/sendMessage", data=payload, headers={"Content-Type": "application/json"})
with urllib.request.urlopen(req) as resp:
    print(resp.read().decode())
PYEOF
        env:
          RUN_FILE: ${{ steps.run-file.outputs.run_file }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
