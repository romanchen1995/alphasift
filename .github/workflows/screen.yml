name: Stock Screening

on:
  schedule:
    - cron: '0 1 * * 1-5'
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install alphasift
        run: pip install -e .

      - name: Run screening
        run: alphasift screen dual_low --no-llm --save-run
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Find latest run file
        id: run-file
        run: |
          RUN_FILE=$(ls -t ${{ github.workspace }}/data/runs/*.json | head -1)
          echo "run_file=$RUN_FILE" >> $GITHUB_OUTPUT

      - name: Send Telegram message
        run: python3 .github/workflows/send_telegram.py
        env:
          RUN_FILE: ${{ steps.run-file.outputs.run_file }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
