          RUN_FILE=$(ls -t ${{ github.workspace }}/data/runs/quality_value/*.json | head -1)
          echo "RUN_FILE=$RUN_FILE" >> $GITHUB_ENV
      - run: python3 .github/workflows/send_telegram.py
        env:
          RUN_FILE: ${{ env.RUN_FILE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  capital_heat:
    if: github.event.inputs.strategy == 'all' || github.event.inputs.strategy == 'capital_heat' || github.event.inputs.strategy == ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -e .
      - run: alphasift screen capital_heat --no-llm --save-run
      - name: Find run file and send Telegram
        run: |
          RUN_FILE=$(ls -t ${{ github.workspace }}/data/runs/capital_heat/*.json | head -1)
          echo "RUN_FILE=$RUN_FILE" >> $GITHUB_ENV
      - run: python3 .github/workflows/send_telegram.py
        env:
          RUN_FILE: ${{ env.RUN_FILE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  
  volume_breakout:
    if: github.event.inputs.strategy == 'all' || github.event.inputs.strategy == 'volume_breakout' || github.event.inputs.strategy == ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -e .
      - run: alphasift screen volume_breakout --no-llm --save-run
      - name: Find run file and send Telegram
        run: |
          RUN_FILE=$(ls -t ${{ github.workspace }}/data/runs/volume_breakout/*.json | head -1)
          echo "RUN_FILE=$RUN_FILE" >> $GITHUB_ENV
      - run: python3 .github/workflows/send_telegram.py
        env:
          RUN_FILE: ${{ env.RUN_FILE }}
          TELEGRAM_BOT_TOKEN: *** secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  shrink_pullback:
    if: github.event.inputs.strategy == 'all' || github.event.inputs.strategy == 'shrink_pullback' || github.event.inputs.strategy == ''
