name: Stock Screening

on:
  schedule:
    - cron: '0 1 * * 1-5'
  workflow_dispatch:
    inputs:
      strategy:
        description: 'Strategy to run (or "all")'
        required: false
        default: 'all'

permissions:
  contents: read

jobs:
  balanced_alpha:
    if: github.event.inputs.strategy == 'all' || github.event.inputs.strategy == 'balanced_alpha' || github.event.inputs.strategy == ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -e .
      - run: alphasift screen balanced_alpha --no-llm --save-run
      - name: Find run file and send Telegram
        run: |
          RUN_FILE=$(ls -t ${{ github.workspace }}/data/runs/balanced_alpha/*.json | head -1)
          echo "RUN_FILE=$RUN_FILE" >> $GITHUB_ENV
      - run: python3 .github/workflows/send_telegram.py
        env:
          RUN_FILE: ${{ env.RUN_FILE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  quality_value:
    if: github.event.inputs.strategy == 'all' || github.event.inputs.strategy == 'quality_value' || github.event.inputs.strategy == ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -e .
      - run: alphasift screen quality_value --no-llm --save-run
      - name: Find run file and send Telegram
